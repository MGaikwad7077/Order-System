<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Pizza</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🍕 Smart Pizza</h1>
  <button onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<section class="menu">

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?pizza" />
    <h3>Margherita</h3>
    <p>₹199</p>
    <button onclick="addToCart('Margherita',199)">Add</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?cheese-pizza" />
    <h3>Farmhouse</h3>
    <p>₹299</p>
    <button onclick="addToCart('Farmhouse',299)">Add</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?paneer-pizza" />
    <h3>Peppy Paneer</h3>
    <p>₹249</p>
    <button onclick="addToCart('Peppy Paneer',249)">Add</button>
  </div>

</section>

<!-- CART PANEL -->
<div id="cart-panel">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
  <input type="text" placeholder="Enter Address" id="address">
  <button onclick="placeOrder()">Checkout</button>
</div>

<script src="script.js"></script>
</body>
</html>
